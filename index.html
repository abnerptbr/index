    .rank-average-value .rank-average-max {
      font-size: 15px;
      font-weight: 700;
      opacity: 0.55;
      margin-left: 2px;
    }

    @media (max-width: 900px) {
      .poster-lightbox-figure {
        max-width: 96vw;
        gap: 28px;
      }
      .poster-lightbox img {
        width: min(42vw, 380px);
        height: min(82vh, 560px);
      }
      .poster-lightbox-panel {
        width: min(420px, 46vw);
      }
    }

    @media (max-width: 760px) {
      .poster-lightbox-figure {
        flex-direction: column;
        align-items: center;
        max-height: 90vh;
        max-height: 90dvh;
        overflow-y: auto;
        overflow-x: hidden;
        width: 100%;
      }

      .poster-lightbox img {
        width: min(80vw, 340px);
        height: min(46vh, 460px);
      }

      .poster-lightbox-panel {
        width: min(92vw, 460px);
        max-height: none;
        align-items: center;
        text-align: center;
      }

      .poster-lightbox-panel .poster-lightbox-list,
      .poster-lightbox-panel .poster-lightbox-title {
        text-align: center;
        justify-content: center;
      }

      .rank-meta {
        justify-content: center;
        text-align: center;
      }
      .rank-meta-item { align-items: center; }

      .rank-row-label { min-width: 104px; }
    }

    .poster-lightbox-announce {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      pointer-events: none;
      border-radius: 0 0 14px 14px;
      z-index: 2;

      background: rgba(10,10,10,0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      -webkit-mask-image: linear-gradient(to right, transparent 0, #000 10%, #000 90%, transparent 100%);
      mask-image: linear-gradient(to right, transparent 0, #000 10%, #000 90%, transparent 100%);
    }

    .poster-lightbox-announce:empty { display: none; }

    .poster-lightbox-announce .announce-line {
      font-family: "Inter", sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1px;
      color: rgba(255,255,255,0.92);
      line-height: 34px;
      height: 34px;
      padding: 0 20px;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 600px) {
      .poster-lightbox-announce { height: 26px; }
      .poster-lightbox-announce .announce-line { font-size: 11px; line-height: 26px; height: 26px; padding: 0 14px; }
    }

    .poster-lightbox-title {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.01em;
      color: var(--text);
      text-align: center;
      max-width: min(92vw, 700px);
    }

    .poster-lightbox-title:empty { display: none; }

    .poster-lightbox-info {
      margin-top: -14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-align: center;
      max-width: min(92vw, 700px);
      line-height: 1.4;
    }

    .poster-lightbox-info:empty { display: none; }

    .poster-lightbox-rank {
      display: inline-block;
      margin-right: 8px;
      font-family: var(--font-title);
      font-weight: 900;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      letter-spacing: -0.01em;
      vertical-align: middle;
    }

    .poster-lightbox-list {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      max-width: min(92vw, 700px);
    }

    .poster-lightbox-list:empty { display: none; }

    .poster-lightbox-list .list-category {
      font-family: var(--font-title);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .poster-lightbox-list .list-division {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--list-color, var(--glow-accent));
      transition: color 0.15s ease;
    }

    /* Sem divisão: o nome da categoria assume o destaque sozinho */
    .poster-lightbox-list.no-division .list-category {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--list-color, var(--glow-accent));
    }

    /* Tags de todas as divisões/categorias às quais o anime pertence
       (ex: "All Animes" + "Mecha/Cyberpunk"). Clicáveis: levam até o
       card do anime naquela lista. */
    .poster-lightbox-list .list-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--tag-color, var(--glow-accent));
      background: none;
      border: none;
      padding: 2px 0 5px;
      margin: 0;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease, filter 0.2s ease;
    }

    .poster-lightbox-list .list-tag:hover,
    .poster-lightbox-list .list-tag:focus-visible {
      border-bottom-color: currentColor;
      filter: brightness(1.25);
    }

    .poster-lightbox-list .list-tag:active {
      filter: brightness(0.95);
    }

    .poster-lightbox-list .list-tag-rank {
      font-weight: 900;
      color: rgba(255,255,255,0.45);
      letter-spacing: -0.01em;
    }

    .poster-lightbox-list .list-sep {
      color: rgba(255,255,255,0.25);
      font-size: 10px;
    }

    /* ── Modo simples: animes sem myranks-images (só zoom + categoria + rank/nome) ── */
    .poster-lightbox-simple-category,
    .poster-lightbox-simple-caption {
      display: none;
    }

    .poster-lightbox.simple-mode .poster-lightbox-panel {
      display: none !important;
    }

    .poster-lightbox.simple-mode .poster-lightbox-figure {
      flex-direction: column !important;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .poster-lightbox.simple-mode .poster-lightbox-media {
      flex: 0 0 auto;
    }

    .poster-lightbox.simple-mode img {
      width: min(70vw, 520px);
      height: min(78vh, 700px);
    }

    .poster-lightbox.simple-mode .poster-lightbox-simple-category {
      display: block;
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--glow-accent);
      text-align: center;
    }

    .poster-lightbox.simple-mode .poster-lightbox-simple-category .simple-category-division {
      font-weight: 800;
    }

    .poster-lightbox.simple-mode .poster-lightbox-simple-caption {
      display: block;
      text-align: center;
      max-width: min(92vw, 500px);
    }

    .poster-lightbox.simple-mode .poster-lightbox-simple-caption .poster-lightbox-rank {
      margin-right: 8px;
      font-size: 13px;
      vertical-align: middle;
    }

    .poster-lightbox.simple-mode .poster-lightbox-simple-caption .poster-lightbox-simple-title {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.01em;
      color: var(--text);
      vertical-align: middle;
    }

    @media (max-width: 760px) {
      .poster-lightbox.simple-mode img {
        width: min(88vw, 400px);
        height: min(58vh, 540px);
      }
    }

    .poster-lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.015);
      color: #cbd5e1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      outline: none;
      transition: background 0.12s ease, color 0.12s ease, transform 0.12s ease;
    }

    .poster-lightbox-close:hover {
      background: rgba(255,255,255,0.05);
      color: #fff;
      transform: scale(1.02);
    }

    .poster-lightbox-close:focus,
    .poster-lightbox-close:focus-visible {
      outline: none;
      box-shadow: none;
    }

    .poster-lightbox-close svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
    }

    @media (max-width: 600px) {
      .poster-lightbox { padding: 20px; }
      .poster-lightbox-close { top: 14px; right: 14px; width: 38px; height: 38px; }
    }

    /* ── Botão flutuante: ir para o topo / ir para o final ── */
    .scroll-fab {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(20,20,20,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      outline: none;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 0.2s ease, transform 0.2s ease, background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 24px -6px rgba(0,0,0,0.5);
    }

    .scroll-fab.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .scroll-fab:hover {
      background: rgba(255,255,255,0.06);
      color: #fff;
      box-shadow: 0 10px 28px -6px rgba(0,0,0,0.6);
    }

    .scroll-fab svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2.4;
      fill: none;
      transition: transform 0.25s ease;
    }

    .scroll-fab.scrolled svg {
      transform: rotate(180deg);
    }

    @media (max-width: 600px) {
      .scroll-fab { right: 16px; bottom: 16px; width: 42px; height: 42px; }
      .scroll-fab svg { width: 18px; height: 18px; }
    }

    .poster-wrap.has-fallback { background: #0e0e10; }

    .poster-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-family: var(--font-title);
      font-size: 15px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
      user-select: none;
    }

    .poster-wrap.has-fallback .poster-fallback { opacity: 1; }
    .poster-wrap.has-fallback .thumb { opacity: 0; }

    /* ── Info ── */
    .meta {
      --meta-pad-x: 24px;
      padding: 0 var(--meta-pad-x);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      min-width: 0;
      position: relative;
    }

    .title-anime {
      margin: 0;
      font-family: var(--font-title);
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title-row {
      display: block;
      min-width: 0;
    }

    .title-row .title-anime {
      min-width: 0;
    }

    /* ── Faixa de anúncio (nova temp./filme) sobre a imagem ── */
    .announce-strip {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 16px; 
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      pointer-events: none;
      z-index: 3;

      background: rgba(10,10,10,0.38);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      -webkit-mask-image: linear-gradient(to right, transparent 0, #000 14%, #000 86%, transparent 100%);
      mask-image: linear-gradient(to right, transparent 0, #000 14%, #000 86%, transparent 100%);
    }

    .announce-strip .announce-track {
      display: flex;
      align-items: center;
      width: max-content;
      will-change: transform;
    }

    @keyframes announce-marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(var(--marquee-distance, -50%)); }
    }

    .announce-strip .announce-line {
      flex: 0 0 auto;
      white-space: nowrap;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: rgba(255, 255, 255, 0.82); 
      line-height: 16px;
      height: 16px;
      padding: 0 32px;
    }

    .pause-icon {
      color: #facc15;
      display: inline-block;
      font-size: 0.85em;
      vertical-align: 1px;
      line-height: 1;
      margin-right: 1px;
    }

    .rewatch-icon {
      color: #38bdf8;
      display: inline-block;
      font-size: 0.85em;
      vertical-align: 1px;
      line-height: 1;
      margin-right: 1px;
    }

    .info {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.35;

      white-space: normal;
      word-break: break-word;
    }

    /* ── Load more ── */
    .load-more-container {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      padding-bottom: 20px;
    }

    .toggle-btn {
      background: transparent;
      color: var(--muted);
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      padding: 10px 20px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 8px;
    }

    .toggle-btn:hover { color: var(--text);}
    .toggle-btn:active { transform: scale(0.98); }

    .arrow {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg);
      transition: transform 0.25s ease;
      margin-top: -3px;
    }

    .toggle-btn.active .arrow { transform: rotate(-135deg); margin-top: 3px; }

    .subtitle-left { display:flex; gap:8px; align-items:center; min-width:0; }
    .subtitle-main { color: var(--muted); font-size: 13px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .info-row {
      display: flex;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }

    .info-row .info {
      flex: 1;
      min-width: 0;
    }

    @media (max-width: 600px) {
      .info-row { display: flex; }
    }

    @media (max-width: 1100px) {
      ol.ranking { grid-template-columns: repeat(2, 1fr); }
      li.anime-item { grid-template-columns: 56px 220px 1fr; }
      .poster-wrap  { width: 220px; height: 110px; }
    }

    @media (max-width: 1300px) {
      .category-drawer { width: min(600px, 92vw); }
    }

    @media (max-width: 900px) {
      li.anime-item { grid-template-columns: 44px 200px 1fr; min-height: 80px; }
      .poster-wrap  { width: 200px; height: 100px; }
      .title-anime  { font-size: 14px; }
      .info         { font-size: 12px; }
      .meta         { --meta-pad-x: 16px; padding: 0 var(--meta-pad-x); }
      .category-drawer { width: min(500px, 92vw); }
      
      .announce-strip { height: 14px; }
      .announce-strip .announce-line { height: 14px; line-height: 14px; font-size: 8px; }
    }

    @media (max-width: 600px) {
      .wrap { margin: 24px auto; padding: 0 10px 32px; }

      ol.ranking {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      li.anime-item {
        border-radius: 14px;
        grid-template-columns: 24px 148px 1fr;
        min-height: 86px;
        gap: 12px;
        padding: 10px 10px 10px 0;
        align-items: stretch;
      }
      li.anime-item:hover { transform: none; box-shadow: none; }

      .rank-wrap { padding: 0; }
      .poster-wrap  {
        width: 148px;
        height: 74px;
        border-radius: 8px;
        align-self: center;
      }
      .rank         { font-size: 15px; color: rgba(255,255,255,0.32); }
      .rank-secondary { font-size: 9px; }
      .meta         {
        --meta-pad-x: 0px;
        padding: 6px var(--meta-pad-x) 6px 0;
        justify-content: center;
        gap: 8px;
      }
      .title-anime  {
        font-size: 14.5px;
        line-height: 1.3;
        -webkit-line-clamp: 2;
        line-clamp: 2;
      }
      
      .announce-strip { height: 14px; }
      .announce-strip .announce-line { height: 14px; line-height: 14px; font-size: 8px; padding: 0 6px; }

      .info {
        font-size: 11.5px;
        line-height: 1.4;
        color: var(--muted);
      }
      header.page-header { flex-direction: column; align-items: flex-start; gap: 14px; margin-bottom: 24px; }
      .header-controls { width: 100%; justify-content: flex-end; }
      h1.title { font-size: 28px; }
      .filter-wrapper { width: auto; flex-grow: 1; }
      .filter-btn { width: 100%; min-width: 0; justify-content: space-between; background: transparent; padding: 12px 14px; }
      .filter-btn svg.icon-left, .filter-btn svg.arrow-icon { width: 18px !important; height: 18px !important; }
      .subtitle { flex-direction: column; align-items:flex-start; gap:6px; }
      .subtitle-main { white-space: normal; }
      .category-drawer { width: 100vw; border-left: none; }
      .drawer-top { padding-top: 18px; }
      .toggle-btn { width: 100%; justify-content: center; padding: 14px 20px; }
      .load-more-container { margin-top: 20px; }
    }

    @media (max-width: 380px) {
      li.anime-item { grid-template-columns: 20px 128px 1fr; min-height: 76px; gap: 10px; }
      .poster-wrap { width: 128px; height: 64px; }
      .title-anime { font-size: 13.5px; }
    }

    @media (max-width: 600px) {
      .search-result-title { font-size: 10px; }
    }

    /* ── "Watching Now" list — vertical/portrait cover art ── */
    ol.ranking.mode-watching {
      gap: 20px 14px;
    }
    ol.ranking.mode-watching li.anime-item {
      grid-template-columns: 64px 158px 1fr;
      min-height: 220px;
    }
    ol.ranking.mode-watching .poster-wrap {
      width: 158px;
      height: 220px;
    }
    
    /* Novo Efeito Hover para Watching Now (Com Glow dinâmico) */
    ol.ranking.mode-watching li.anime-item:hover {
      background: color-mix(in srgb, var(--item-hover-color, #f59e0b) 8%, transparent);
      box-shadow: 
        0 12px 32px -8px rgba(0,0,0,0.7), 
        0 0 0 1px var(--item-hover-color, #f59e0b),
        0 0 12px -3px var(--item-hover-color, #f59e0b);
      z-index: 2; /* Garante que a sombra fique sobre os outros cards */
    }

    /* ── Barra de progresso visual (Watching Now) ── */
    .watch-progress {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .watch-progress-track {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      position: relative;
    }

    .watch-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg,
        color-mix(in srgb, var(--item-hover-color, #f59e0b) 70%, white 10%),
        var(--item-hover-color, #f59e0b));
      box-shadow: 0 0 8px -1px var(--item-hover-color, #f59e0b);
      transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      width: 0%;
    }

    /* Estado indeterminado: quando o total de episódios ainda não é conhecido
       (ex: obra em lançamento), não dá pra mostrar um % real, então usamos
       uma faixa animada em loop pra comunicar "em andamento". */
    .watch-progress-fill--indeterminate {
      width: 40% !important;
      background: linear-gradient(90deg,
        transparent,
        color-mix(in srgb, var(--item-hover-color, #f59e0b) 70%, white 10%),
        var(--item-hover-color, #f59e0b),
        transparent);
      animation: watch-progress-indeterminate 1.8s ease-in-out infinite;
    }

    @keyframes watch-progress-indeterminate {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(280%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .watch-progress-fill--indeterminate {
        animation: none;
        width: 100% !important;
        opacity: 0.55;
      }
    }

    /* Marcador de divisão de temporada dentro da barra de progresso.
       Usado quando o anime tem várias temporadas e a barra mostra o
       progresso total (soma de todas), com uma linha em cada ponto
       onde uma temporada termina e a próxima começa. */
    .watch-progress-season-mark {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(3,3,3,0.75);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.28);
      z-index: 2;
      pointer-events: none;
    }

    /* Zona invisível sobre cada trecho da barra correspondente a uma
       temporada. Não altera o visual por padrão, mas no hover realça
       levemente o trecho e mostra (via title, tooltip nativo) quantos
       episódios aquela temporada tem. */
    .watch-progress-season-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      z-index: 3;
      cursor: default;
      transition: background 0.15s ease;
    }

    .watch-progress-season-zone:hover {
      background: rgba(255,255,255,0.18);
    }

    /* Marcador de divisão de "cour" (metades em que uma mesma temporada
       foi exibida, ex: 2ª temporada de Re:Zero em dois blocos). É mais
       discreto que o marcador de temporada — fino e mais curto — pra
       deixar claro que é uma subdivisão, não uma temporada nova. */
    .watch-progress-cour-mark {
      position: absolute;
      top: 20%;
      bottom: 20%;
      width: 1.5px;
      background: rgba(255,255,255,0.6);
      border-radius: 1px;
      z-index: 2;
      pointer-events: none;
    }

    .watch-progress-label {
      flex: 0 0 auto;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    /* Total geral (soma de todas as temporadas), mostrado bem menor e mais
       apagado ao lado do progresso da temporada atual, entre parênteses. */
    .watch-progress-label-total {
      font-size: 9px;
      font-weight: 500;
      color: var(--low-priority);
      margin-left: 4px;
      letter-spacing: 0.01em;
    }

    .watch-progress-label-total::before { content: "("; }
    .watch-progress-label-total::after { content: ")"; }

    @media (max-width: 600px) {
      .watch-progress-label-total { font-size: 8px; margin-left: 3px; }
    }

    .watch-progress-inc,
    .watch-progress-dec {
      flex: 0 0 auto;
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 13px;
      line-height: 1;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    .watch-progress-inc:hover:not(:disabled),
    .watch-progress-dec:hover:not(:disabled) {
      background: var(--item-hover-color, #f59e0b);
      border-color: var(--item-hover-color, #f59e0b);
      color: #030303;
      transform: scale(1.08);
    }

    .watch-progress-inc:active:not(:disabled),
    .watch-progress-dec:active:not(:disabled) {
      transform: scale(0.94);
    }

    .watch-progress-inc:disabled,
    .watch-progress-dec:disabled {
      opacity: 0.3;
      cursor: default;
    }

    @media (max-width: 600px) {
      .watch-progress { margin-top: 6px; gap: 8px; }
      .watch-progress-track { height: 5px; }
      .watch-progress-label { font-size: 10px; }
      .watch-progress-inc, .watch-progress-dec { width: 18px; height: 18px; font-size: 12px; }
    }

    /* ── SEASON HEADERS PERSONALIZADOS ── */
    li.season-header {
      grid-column: 1 / -1;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 32px 4px 14px;
      font-family: var(--font-title);
      font-weight: 900;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--season-color);
      
      /* Aqui está a mágica: Reinicia o contador para cada cabeçalho de temporada! */
      counter-reset: item; 
    }
    li.season-header:first-child { padding-top: 12px; }
    
    li.season-header .season-text {
      flex: 0 0 auto;
    }
    
    li.season-header .season-line {
      flex: 1;
      height: 1px;
      background: color-mix(in srgb, var(--season-color) 35%, transparent);
    }

    @media (max-width: 600px) {
      li.season-header { font-size: 11px; padding: 24px 2px 10px; gap: 12px; }
      li.season-header:first-child { padding-top: 8px; }
      
      ol.ranking.mode-watching li.anime-item:hover {
        transform: translateY(-2px) translateZ(0); /* Leve efeito também no mobile para dar o feedback */
      }
    }

    @media (max-width: 1100px) {
      ol.ranking.mode-watching li.anime-item { grid-template-columns: 56px 138px 1fr; min-height: 192px; }
      ol.ranking.mode-watching .poster-wrap { width: 138px; height: 192px; }
    }

    @media (max-width: 900px) {
      ol.ranking.mode-watching li.anime-item { grid-template-columns: 44px 118px 1fr; min-height: 165px; }
      ol.ranking.mode-watching .poster-wrap { width: 118px; height: 165px; }
    }

    @media (max-width: 600px) {
      ol.ranking.mode-watching li.anime-item { grid-template-columns: 30px 96px 1fr; min-height: 134px; }
      ol.ranking.mode-watching .poster-wrap { width: 96px; height: 134px; }
    }

    @media (max-width: 380px) {
      ol.ranking.mode-watching li.anime-item { grid-template-columns: 26px 82px 1fr; min-height: 115px; }
      ol.ranking.mode-watching .poster-wrap { width: 82px; height: 115px; }
    }

    /* ── Top 3: borda superior especial (ouro, prata, bronze) ── */
    li.anime-item.rank-gold,
    li.anime-item.rank-silver,
    li.anime-item.rank-bronze,
    li.fav-ep-card.rank-gold,
    li.fav-ep-card.rank-silver,
    li.fav-ep-card.rank-bronze {
      position: relative;
    }

    li.anime-item.rank-gold::before,
    li.anime-item.rank-silver::before,
    li.anime-item.rank-bronze::before,
    li.fav-ep-card.rank-gold::before,
    li.fav-ep-card.rank-silver::before,
    li.fav-ep-card.rank-bronze::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      border-radius: 10px 10px 0 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.55;
    }

    /* Os cards de Favorite Episodes têm o border-radius maior (18px) —
       a faixa precisa acompanhar a curvatura do canto do próprio card. */
    li.fav-ep-card.rank-gold::before,
    li.fav-ep-card.rank-silver::before,
    li.fav-ep-card.rank-bronze::before {
      border-radius: 18px 18px 0 0;
    }

    li.anime-item.rank-gold::before,
    li.fav-ep-card.rank-gold::before {
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
      box-shadow: 0 0 6px -1px rgba(212, 175, 55, 0.35);
    }

    li.anime-item.rank-silver::before,
    li.fav-ep-card.rank-silver::before {
      background: linear-gradient(90deg, transparent, #b8bcc2, transparent);
      box-shadow: 0 0 6px -1px rgba(184, 188, 194, 0.3);
    }

    li.anime-item.rank-bronze::before,
    li.fav-ep-card.rank-bronze::before {
      background: linear-gradient(90deg, transparent, #b0703f, transparent);
      box-shadow: 0 0 6px -1px rgba(176, 112, 63, 0.3);
    }

    /* ══════════════════════════════════════════════════════════════
       ⭐ FAVORITE EPISODES — card totalmente diferente do resto do site:
       imagem grande no topo, nota pessoal em baixo, em vez da linha
       horizontal poster+meta usada nos outros modos.
       ══════════════════════════════════════════════════════════════ */
    ol.ranking.mode-fav-episodes {
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      counter-reset: item;
    }

    @media (max-width: 900px) {
      ol.ranking.mode-fav-episodes { grid-template-columns: 1fr; }
    }

    .fav-ep-empty {
      list-style: none;
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      border: 1px dashed rgba(255,255,255,0.14);
      border-radius: 16px;
    }

    .fav-ep-empty code {
      background: rgba(255,255,255,0.06);
      padding: 2px 7px;
      border-radius: 6px;
      color: #3b82f6;
      font-size: 12.5px;
    }

    /* ── Card de episódio favorito (imagem à esquerda + conteúdo à direita) ── */
    li.fav-ep-card {
      counter-increment: item;
      list-style: none;
      display: grid;
      grid-template-columns: 56px 420px 1fr;
      align-items: stretch;
      min-height: 300px;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
      position: relative;
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease, background 0.2s ease;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    /* Mesmo overlay branco sutil usado nos outros cards do site ao passar o mouse */
    li.fav-ep-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.06);
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
      border-radius: inherit;
    }

    li.fav-ep-card:hover::after { opacity: 1; }

    li.fav-ep-card:hover {
      transform: translateY(-3px) translateZ(0);
      box-shadow: 0 12px 32px -8px rgba(0,0,0,0.6);
    }

    li.fav-ep-card:hover .fav-ep-media-main .thumb {
      transform: scale(1.05);
    }

    /* Hover colorido igual ao resto do site (usa --item-hover-color, azul por padrão nesta lista) */
    li.fav-ep-card[style*="--item-hover-color"]:hover {
      background: color-mix(in srgb, var(--item-hover-color) 8%, transparent);
      box-shadow:
        0 12px 32px -8px rgba(0,0,0,0.7),
        0 0 0 1px var(--item-hover-color),
        0 0 12px -3px var(--item-hover-color);
    }

    /* ── Coluna de mídia: imagem grande + carrossel de mini-thumbnails ── */
    .fav-ep-media {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px;
      min-width: 0;
    }

    .fav-ep-media-main.poster-wrap {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      cursor: inherit;
    }

    .fav-ep-media-main .thumb,
    .fav-ep-media-main .poster-fallback {
      border-radius: 12px;
    }

    /* ── Contador "posição/total" (ex: 1/5) sobre o canto da imagem grande,
       indicando em qual imagem do carrossel o usuário está ── */
    .fav-ep-counter {
      position: absolute;
      right: 10px;
      top: 10px;
      z-index: 2;
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 11.5px;
      letter-spacing: 0.02em;
      color: #fff;
      background: rgba(10,10,10,0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 3px 9px;
      border-radius: 999px;
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
    }

    /* Navegação de mini-thumbnails (setas ‹ › + tira de imagens) */
    .fav-ep-thumbnav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .fav-ep-thumbnav-arrow {
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s ease;
    }

    .fav-ep-thumbnav-arrow svg { width: 13px; height: 13px; }

    .fav-ep-thumbnav-arrow:hover {
      color: #fff;
    }

    .fav-ep-thumbstrip {
      flex: 1;
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scrollbar-width: none;
      min-width: 0;
      /* A largura real é travada via JS (sizeFavEpThumbstrip) para caber
         só miniaturas inteiras, então nenhuma aparece cortada na borda. */
    }

    .fav-ep-thumbstrip::-webkit-scrollbar { display: none; }

    .fav-ep-thumb {
      flex: 0 0 auto;
      width: 92px;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      overflow: hidden;
      padding: 0;
      border: 1.5px solid rgba(255,255,255,0.08);
      background: var(--surface);
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    .fav-ep-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .fav-ep-thumb:hover { opacity: 0.85; transform: translateY(-1px); }
    .fav-ep-thumb.is-active { opacity: 1; border-color: #3b82f6; }

    /* ── Coluna de conteúdo: título, nota estilo IMDb + link, descrição ── */
    .fav-ep-content {
      padding: 22px 28px 24px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      min-width: 0;
    }

    .fav-ep-heading {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .fav-ep-anime {
      margin: 0;
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 23px;
      color: #fff;
      line-height: 1.25;
    }

    .fav-ep-episode {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    /* Linha com o selo de nota estilo IMDb + link pro anime */
    .fav-ep-rating-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .fav-ep-rating {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    a.fav-ep-rating:hover { opacity: 0.8; }

    .fav-ep-rating-source {
      font-family: var(--font-title);
      font-weight: 900;
      font-size: 12px;
      letter-spacing: -0.02em;
      color: #000;
      background: #f5c518;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1.3;
    }

    .fav-ep-rating-value {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 15px;
      color: #fff;
    }

    .fav-ep-rating-max {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-left: 1px;
    }

    /* Selo de nota pessoal, ao lado do selo do IMDb */
    .fav-ep-my-rating {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
    }

    .fav-ep-my-rating-source {
      font-family: var(--font-title);
      font-weight: 900;
      font-size: 12px;
      letter-spacing: -0.02em;
      color: #0b0b0b;
      background: linear-gradient(135deg, #f8fafc, var(--glow-accent, #cbd5e1));
      padding: 2px 7px;
      border-radius: 4px;
      line-height: 1.3;
      box-shadow: 0 0 0 1px rgba(203,213,225,0.35), 0 0 14px rgba(203,213,225,0.35);
    }

    .fav-ep-my-rating-value {
      font-family: var(--font-title);
      font-weight: 900;
      font-size: 16.5px;
      color: var(--glow-accent, #cbd5e1);
      text-shadow: 0 0 16px rgba(203,213,225,0.28);
    }

    .fav-ep-my-rating-max {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      opacity: 0.75;
      margin-left: 1px;
    }

    .fav-ep-rating-sep {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
    }

    .fav-ep-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .fav-ep-link:hover { color: #fff; }
    .fav-ep-link svg { width: 12px; height: 12px; flex: 0 0 12px; }

    .fav-ep-note {
      margin: 0;
      font-size: 14px;
      line-height: 1.65;
      color: #d1d5db;
      font-style: italic;
    }

    .fav-ep-quote-mark {
      font-family: var(--font-title);
      font-size: 26px;
      font-weight: 900;
      font-style: normal;
      color: rgba(59,130,246,0.55);
      line-height: 0;
      vertical-align: -5px;
      margin-right: 3px;
    }

    .fav-ep-quote-mark-end {
      margin-right: 0;
      margin-left: 3px;
    }

    @media (max-width: 760px) {
      li.fav-ep-card { grid-template-columns: 1fr; }
      /* No mobile o número não fica mais numa linha própria acima da
         imagem: o rank-wrap original é escondido e o número reaparece
         embutido antes do nome do anime (ex.: "#1 Code Geass..."),
         via ::before com o mesmo counter(item) que já numera a lista. */
      li.fav-ep-card .rank-wrap {
        display: none;
      }
      .fav-ep-anime::before {
        content: "#" counter(item) " ";
        font-weight: 900;
        color: rgba(255,255,255,0.4);
      }
      .fav-ep-content { padding: 18px 20px 22px; }
    }

    @media (max-width: 420px) {
      .fav-ep-anime { font-size: 19px; }
      .fav-ep-thumb { width: 62px; }
    }
  </style>

</head>

<body>
  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <aside class="category-drawer" id="categoryDrawer" aria-hidden="true">
    <div class="drawer-top">
      <div class="drawer-top-text">
        <span class="drawer-eyebrow"> ©2026 myhtml - @abnerssk</span>
        <h2 class="drawer-title" id="drawerTitleEl">You Decided That:</h2>

      </div>
      <div class="drawer-top-actions">
        <button class="drawer-close" id="drawerCloseBtn" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="drawer-tabs" role="tablist">
      <button class="drawer-tab active" data-tab="ranks" role="tab" aria-selected="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M8 21h8"></path>
          <path d="M12 17v4"></path>
          <path d="M7 4h10v5a5 5 0 0 1-10 0V4Z"></path>
          <path d="M17 5h2.5a1 1 0 0 1 1 1v1a3 3 0 0 1-3 3"></path>
          <path d="M7 5H4.5a1 1 0 0 0-1 1v1a3 3 0 0 0 3 3"></path>
        </svg>
        MyRanks
      </button>
      <button class="drawer-tab" data-tab="lists" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="8" y1="6" x2="21" y2="6"></line>
          <line x1="8" y1="12" x2="21" y2="12"></line>
          <line x1="8" y1="18" x2="21" y2="18"></line>
          <line x1="3" y1="6" x2="3.01" y2="6"></line>
          <line x1="3" y1="12" x2="3.01" y2="12"></line>
          <line x1="3" y1="18" x2="3.01" y2="18"></line>
        </svg>
        MyLists
      </button>
      <button class="drawer-tab" data-tab="search" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        Search
      </button>
    </div>

    <div class="drawer-content">
      <div class="drawer-panel active" data-panel="ranks">
        <div class="drawer-section">
          <div class="drawer-section-title">My Main Anime Ranks</div>
          <div class="drawer-grid">

  <script>
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }

    document.addEventListener("DOMContentLoaded", async function() {
      // ── Trava de scroll compartilhada por todos os drawers/lightbox ──
      // Importante: NUNCA muda "overflow" de html/body. Em vez disso, fixa o
      // body na posição atual (position:fixed + top negativo). Como a
      // propriedade "overflow" nunca é tocada, o navegador nunca recalcula a
      // presença/ausência da scrollbar nativa, então a largura da página
      // (e dos cards) nunca muda ao abrir/fechar um drawer, em nenhum navegador.
      let __scrollLockCount = 0;
      let __scrollLockY = 0;

      function lockBodyScroll() {
        if (__scrollLockCount === 0) {
          __scrollLockY = window.scrollY || window.pageYOffset || 0;
          document.body.style.position = 'fixed';
          document.body.style.top = (-__scrollLockY) + 'px';
          document.body.style.left = '0';
          document.body.style.right = '0';
          document.body.style.width = '100%';
        }
        __scrollLockCount++;
      }

      function unlockBodyScroll() {
        __scrollLockCount = Math.max(0, __scrollLockCount - 1);
        if (__scrollLockCount === 0) {
          document.body.style.position = '';
          document.body.style.top = '';
          document.body.style.left = '';
          document.body.style.right = '';
          document.body.style.width = '';
          window.scrollTo(0, __scrollLockY);
        }
      }

      // ── Lightbox: amplia a imagem do card ao clicar nela ──
      (function initPosterLightbox() {
        const lightbox = document.getElementById('posterLightbox');
        const lightboxAmbient = document.getElementById('posterLightboxAmbient');
        const lightboxImg = document.getElementById('posterLightboxImg');
        const lightboxTitle = document.getElementById('posterLightboxTitle');
        const lightboxList = document.getElementById('posterLightboxList');
        const lightboxAnnounce = document.getElementById('posterLightboxAnnounce');
        const lightboxRatings = document.getElementById('posterLightboxRatings');
        const lightboxMeta = document.getElementById('posterLightboxMeta');
        const lightboxMal = document.getElementById('posterLightboxMal');
        const lightboxInfo = document.getElementById('posterLightboxInfo');
        const lightboxSimpleCategory = document.getElementById('posterLightboxSimpleCategory');
        const lightboxMediaCategory = document.getElementById('posterLightboxMediaCategory');
        const lightboxSimpleCaption = document.getElementById('posterLightboxSimpleCaption');
        const closeBtn = document.getElementById('posterLightboxClose');
        if (!lightbox || !lightboxImg || !closeBtn) return;

        let lastFocused = null;
        let currentItem = null;

        // ── Som especial ao abrir o poster-lightbox do Re:Zero ──
        const rezeroSound = new Audio('assets/rdb-rezero.mp3');
        rezeroSound.loop = true;
        const REZERO_IDS = ['re-zero', 'rw-re-zero'];

        // ── Som especial ao abrir o poster-lightbox do JJK (sem loop) ──
        const jjkSound = new Audio('assets/yuta-jjk.mp3');
        jjkSound.loop = false;
        const JJK_IDS = ['jjk'];

        // ── Sistema de notas (Story / Animation / Characters / Ending) ──
        const RATING_CATEGORIES = [
          { key: 'animation',  label: 'Animation' },
          { key: 'characters', label: 'Characters' },
          { key: 'emotional',  label: 'Emotional Impact' },
        ];
        const RATINGS_STORAGE_KEY = 'myanimerank_ratings';
        const EXCLUDED_STORAGE_KEY = 'myanimerank_excluded_categories';
        const META_STORAGE_KEY = 'myanimerank_meta';
        const META_FIELDS = [
          { key: 'studio',  label: 'Studio',    placeholder: 'br' },
          { key: 'season',  label: 'Lançamento', placeholder: 'br' },
          { key: 'rewatch', label: 'Rewatch',   placeholder: 'patapim' }
        ];

        function loadAllMeta() {
          try {
            return JSON.parse(localStorage.getItem(META_STORAGE_KEY) || '{}');
          } catch (e) {
            return {};
          }
        }

        function saveAllMeta(data) {
          try {
            localStorage.setItem(META_STORAGE_KEY, JSON.stringify(data));
          } catch (e) {}
        }

        function getMetaFor(animeId) {
          const all = loadAllMeta();
          const staticMeta = (typeof ANIME_STATIC_META !== 'undefined' && ANIME_STATIC_META[animeId]) || {};
          return { ...staticMeta, ...(all[animeId] || {}) };
        }

        function setMetaFor(animeId, fieldKey, value) {
          const all = loadAllMeta();
          if (!all[animeId]) all[animeId] = {};
          const trimmed = String(value || '').trim();
          if (trimmed) {
            all[animeId][fieldKey] = trimmed;
          } else {
            delete all[animeId][fieldKey];
          }
          if (Object.keys(all[animeId]).length === 0) delete all[animeId];
          saveAllMeta(all);
        }

        function renderMeta(animeId) {
          if (!lightboxMeta) return;
          // Somente leitura: os valores vêm direto do rawAnimeData (studio, airedSeason, rewatch).
          // Para alterar, edite o objeto correspondente no rawAnimeData pelo VSCode.
          const metaObj = getMetaFor(animeId);

          const fieldsHtml = META_FIELDS.map(field => {
            let rawValue = metaObj[field.key] || '';
            const isEmpty = !rawValue;
            // O "!" no final de "season" é só um marcador interno e não deve
            // aparecer pro usuário no campo de Lançamento.
            if (field.key === 'season') {
              rawValue = rawValue.replace(/!$/, '');
            }
            // Quando há mais de um estúdio (ex: "Wit Studio/MAPPA"), separa
            // com " / " espaçado em vez de deixar tudo colado e feio.
            const displayValue = (field.key === 'studio' && rawValue.includes('/'))
              ? rawValue.split('/').map(s => s.trim()).filter(Boolean).join(' / ')
              : rawValue;
            return `
              <div class="rank-meta-item">
                <span class="rank-meta-label">${field.label}</span>
                <span class="rank-meta-value${isEmpty ? ' empty' : ''}"
                      data-field="${field.key}">${isEmpty ? escapeHtml(field.placeholder) : escapeHtml(displayValue)}</span>
              </div>`;
          }).join('');

          lightboxMeta.innerHTML = fieldsHtml;
        }

        // ── Notas do MyAnimeList (por temporada) ──
        // Só aparece nos cards do "All Animes" (animeData) e somente quando o
        // item tiver um array "mal" preenchido, ex:
        //   mal: [ { label: "1ª temporada", episodes: 25, note: 8.42 }, ... ]
        // Basta editar o objeto correspondente lá no rawAnimeData.
        function renderMalScores(animeId) {
          if (!lightboxMal) return;
          const item = (typeof animeData !== 'undefined') && animeData.find(a => a.id === animeId);
          const entries = item && Array.isArray(item.mal) ? item.mal : null;

          if (!entries || !entries.length) {
            lightboxMal.innerHTML = '';
            return;
          }

          const rowsHtml = entries.map(entry => {
            if (entry.spacer) {
              return `
              <div class="rank-mal-row">
                <span class="rank-mal-spacer"></span>
              </div>`;
            }
            const seasonLabel = escapeHtml(entry.label || '');
            const epPart = (entry.episodes != null && entry.episodes !== '')
              ? (typeof entry.episodes === 'number'
                  ? `: ${escapeHtml(String(entry.episodes))} episódios`
                  : `: ${escapeHtml(String(entry.episodes))}`)
              : '';
            const hasNote = entry.note != null && entry.note !== '';
            const noteText = hasNote
              ? `${escapeHtml(String(entry.note))}<span class="rank-mal-note-max">/10</span>`
              : '—';
            return `
              <div class="rank-mal-row">
                <span class="rank-mal-content"><span class="rank-mal-season">${seasonLabel}</span><span class="rank-mal-eps">${epPart}</span></span>
                <span class="rank-mal-note${hasNote ? '' : ' empty'}">${noteText}</span>
              </div>`;
          }).join('');

          lightboxMal.innerHTML = `
            <a class="rank-mal-label" href="https://myanimelist.net/" target="_blank" rel="noopener">MyAnimeList</a>
            <div class="rank-mal-rows">${rowsHtml}</div>`;
        }

        function loadAllRatings() {
          try {
            return JSON.parse(localStorage.getItem(RATINGS_STORAGE_KEY) || '{}');
          } catch (e) {
            return {};
          }
        }

        function saveAllRatings(data) {
          try {
            localStorage.setItem(RATINGS_STORAGE_KEY, JSON.stringify(data));
          } catch (e) {}
        }

        function getRatingsFor(animeId) {
          const all = loadAllRatings();
          return all[animeId] || {};
        }

        function setRatingFor(animeId, categoryKey, value) {
          const all = loadAllRatings();
          if (!all[animeId]) all[animeId] = {};
          if (value >= 0) {
            all[animeId][categoryKey] = value;
          } else {
            delete all[animeId][categoryKey];
          }
          if (Object.keys(all[animeId]).length === 0) delete all[animeId];
          saveAllRatings(all);
        }

        // ── Categorias excluídas da média (ex: clicar em "Ending" pra ignorá-la) ──
        function loadAllExcluded() {
          try {
            return JSON.parse(localStorage.getItem(EXCLUDED_STORAGE_KEY) || '{}');
          } catch (e) {
            return {};
          }
        }

        function saveAllExcluded(data) {
          try {
            localStorage.setItem(EXCLUDED_STORAGE_KEY, JSON.stringify(data));
          } catch (e) {}
        }

        function getExcludedFor(animeId) {
          const all = loadAllExcluded();
          return all[animeId] || {};
        }

        function isCategoryExcluded(animeId, categoryKey) {
          return !!getExcludedFor(animeId)[categoryKey];
        }

        function toggleCategoryExcluded(animeId, categoryKey) {
          const all = loadAllExcluded();
          if (!all[animeId]) all[animeId] = {};
          if (all[animeId][categoryKey]) {
            delete all[animeId][categoryKey];
          } else {
            all[animeId][categoryKey] = true;
          }
          if (Object.keys(all[animeId]).length === 0) delete all[animeId];
          saveAllExcluded(all);
        }

        const STAR_PATH = 'M12 2.5l2.9 6.06 6.6.79-4.86 4.6 1.28 6.55L12 17.5l-5.92 3-1.28-6.55-4.94-4.79 6.6-.79z';

        function buildStarSlot(index) {
          // Cada slot representa uma estrela inteira (1..5), com metade
          // esquerda/direita clicável para permitir notas de 0.5 em 0.5.
          return `
            <span class="star-slot" data-index="${index}">
              <svg viewBox="0 0 24 24" class="star-outline">
                <path d="${STAR_PATH}"></path>
              </svg>
              <svg viewBox="0 0 24 24" class="star-fill full">
                <path d="${STAR_PATH}"></path>
              </svg>
              <svg viewBox="0 0 24 24" class="star-fill half">
                <path d="${STAR_PATH}"></path>
              </svg>
              <span class="star-half-hit" data-value="${index - 0.5}"></span>
              <span class="star-full-hit" data-value="${index}"></span>
            </span>`;
        }

        function renderStarsValue(container, value) {
          const slots = container.querySelectorAll('.star-slot');
          slots.forEach((slot, i) => {
            const starIndex = i + 1;
            const full = slot.querySelector('.star-fill.full');
            const half = slot.querySelector('.star-fill.half');
            const isFull = value >= starIndex;
            const isHalf = !isFull && value >= starIndex - 0.5;
            full.style.display = isFull ? 'block' : 'none';
            half.style.display = isHalf ? 'block' : 'none';
            slot.classList.toggle('empty', !isFull && !isHalf);
          });
        }

        // Interpola do vermelho (nota baixa) ao azul (nota alta) passando
        // por um tom neutro no meio, num gradiente HSL suave.
        function colorForRating(value) {
          if (!value || value <= 0) return null;
          const t = Math.max(0, Math.min(1, value / 5));
          // 0 -> vermelho (hue 0), 1 -> azul (hue 215)
          const hue = 0 + t * 215;
          const sat = 78;
          const light = 58;
          return `hsl(${hue.toFixed(0)}deg ${sat}% ${light}%)`;
        }

        function computeAverage(ratingsObj, excludedObj) {
          const excluded = excludedObj || {};
          const values = RATING_CATEGORIES
            .filter(c => !excluded[c.key])
            .map(c => ratingsObj[c.key])
            .filter(v => typeof v === 'number' && v >= 0);
          if (!values.length) return null;
          const sum = values.reduce((a, b) => a + b, 0);
          return sum / values.length;
        }

        function renderRatings(animeId) {
          if (!lightboxRatings) return;
          const ratingsObj = getRatingsFor(animeId);

          const rowsHtml = RATING_CATEGORIES.map(cat => `
            <div class="rank-row" data-category="${cat.key}">
              <span class="rank-row-label" data-category="${cat.key}" role="button" tabindex="0" title="Clique para excluir/incluir na média">${cat.label}</span>
              <span class="rank-stars" role="slider" aria-label="${cat.label}" tabindex="0">
                <span class="star-zero-hit" data-value="0" title="Zerar nota"></span>
                ${[1,2,3,4,5].map(buildStarSlot).join('')}
              </span>
              <span class="rank-score">–</span>
            </div>`).join('');

          lightboxRatings.innerHTML = rowsHtml;

          RATING_CATEGORIES.forEach(cat => {
            const row = lightboxRatings.querySelector(`.rank-row[data-category="${cat.key}"]`);
            if (!row) return;
            const starsEl = row.querySelector('.rank-stars');
            const scoreEl = row.querySelector('.rank-score');
            const labelEl = row.querySelector('.rank-row-label');
            const value = ratingsObj[cat.key] || 0;

            function applyExcludedState() {
              const excluded = isCategoryExcluded(animeId, cat.key);
              row.classList.toggle('excluded', excluded);
              if (labelEl) labelEl.classList.toggle('excluded', excluded);
            }

            applyExcludedState();

            if (labelEl) {
              labelEl.addEventListener('click', function() {
                toggleCategoryExcluded(animeId, cat.key);
                applyExcludedState();
                updateAverage(animeId);
              });
              labelEl.addEventListener('keydown', function(e) {
                if (e.key !== 'Enter' && e.key !== ' ') return;
                e.preventDefault();
                toggleCategoryExcluded(animeId, cat.key);
                applyExcludedState();
                updateAverage(animeId);
              });
            }

            function applyValue(v) {
              const clamped = Math.max(0, Math.min(5, v));
              renderStarsValue(starsEl, clamped);
              scoreEl.textContent = clamped > 0 ? clamped.toFixed(1).replace(/\.0$/, '') : '0';
              const color = colorForRating(clamped);
              starsEl.style.setProperty('--star-color', color || 'var(--glow-accent)');
              scoreEl.style.setProperty('--star-color', color || 'var(--text)');
            }

            applyValue(value);

            starsEl.addEventListener('mousemove', function(e) {
              const hit = e.target.closest('.star-zero-hit, .star-half-hit, .star-full-hit');
              if (!hit) return;
              applyValue(parseFloat(hit.getAttribute('data-value')));
            });

            starsEl.addEventListener('mouseleave', function() {
              const current = getRatingsFor(animeId)[cat.key] || 0;
              applyValue(current);
            });

            starsEl.addEventListener('click', function(e) {
              const hit = e.target.closest('.star-zero-hit, .star-half-hit, .star-full-hit');
              if (!hit) return;
              let value = parseFloat(hit.getAttribute('data-value'));
              const current = getRatingsFor(animeId)[cat.key] || 0;
              // clicar de novo no mesmo valor zera a nota
              if (current === value) value = 0;
              setRatingFor(animeId, cat.key, value);
              applyValue(value);
              updateAverage(animeId);
            });

            starsEl.addEventListener('keydown', function(e) {
              const current = getRatingsFor(animeId)[cat.key] || 0;
              let next = current;
              if (e.key === 'ArrowRight' || e.key === 'ArrowUp') next = Math.min(5, current + 0.5);
              else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') next = Math.max(0, current - 0.5);
              else return;
              e.preventDefault();
              e.stopPropagation();
              setRatingFor(animeId, cat.key, next);
              applyValue(next);
              updateAverage(animeId);
            });
          });

          updateAverage(animeId);
        }

        function updateAverage(animeId) {
          if (!lightboxRatings) return;
          const avgEl = lightboxRatings.querySelector('.rank-average-value');
          const numEl = lightboxRatings.querySelector('.rank-average-number');
          const maxEl = lightboxRatings.querySelector('.rank-average-max');
          if (!avgEl || !numEl) return;
          const avg = computeAverage(getRatingsFor(animeId), getExcludedFor(animeId));
          if (avg == null) {
            numEl.textContent = '–';
            if (maxEl) maxEl.style.display = 'none';
            avgEl.style.setProperty('--star-color-avg', 'var(--glow-accent)');
            return;
          }
          // Escala de 0–5 (estrelas) para 0–10, mostrando 1 casa decimal,
          // ou 2 quando a segunda casa não é zero (ex: 9.25)
          const scaled = avg * 2;
          const rounded2 = Math.round(scaled * 100) / 100;
          const asStr = rounded2.toFixed(2);
          numEl.textContent = asStr;
          if (maxEl) maxEl.style.display = '';
          avgEl.style.setProperty('--star-color-avg', colorForRating(avg) || 'var(--glow-accent)');
        }

        function getVisibleItems() {
          return Array.from(document.querySelectorAll('.anime-item')).filter(
            it => !it.classList.contains('hidden-item') && it.offsetParent !== null
          );
        }

        function escapeHtml(str) {
          return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        function getRankPosition(item) {
          const items = getVisibleItems();
          if (items.indexOf(item) === -1) return null;

          // Percorre os irmãos do DOM a partir do item, para trás, contando
          // quantos .anime-item visíveis existem até encontrar o .season-header
          // da divisão atual (ex: "Summer Season 2026"). Isso faz a posição
          // ser relativa à divisão, e não à lista inteira da página.
          let pos = 1;
          let sibling = item.previousElementSibling;
          while (sibling) {
            if (sibling.classList && sibling.classList.contains('season-header')) break;
            if (sibling.classList && sibling.classList.contains('anime-item') &&
                !sibling.classList.contains('hidden-item') && sibling.offsetParent !== null) {
              pos++;
            }
            sibling = sibling.previousElementSibling;
          }
          return pos;
        }

        // Acha o cabeçalho de divisão (.season-header) mais próximo que
        // precede o card na lista (ex: "Summer Season 2026", "Watched Animes").
        // Retorna TODAS as divisões/categorias às quais o anime pertence
        // (ex: "All Animes" + "Mecha/Cyberpunk"), não só a aba que está aberta.
        function getMembershipTags(animeId) {
          const tags = [{ key: 'all', label: CATEGORY_LABEL.all, color: CATEGORY_HOVER_COLOR.all }];
          ['romance', 'isekai', 'sports', 'mecha'].forEach(key => {
            if (SUB_CATEGORY_SETS[key] && SUB_CATEGORY_SETS[key].has(animeId)) {
              tags.push({ key, label: CATEGORY_LABEL[key], color: CATEGORY_HOVER_COLOR[key] });
            }
          });
          // Posição do anime dentro de cada uma dessas listas (ex: #5 em Mecha/Cyberpunk)
          tags.forEach(t => {
            const list = (typeof getFilteredData === 'function') ? getFilteredData(t.key) : [];
            const idx = list.findIndex(a => a.id === animeId);
            t.position = idx === -1 ? null : idx + 1;
          });
          return tags;
        }

        function getDivisionInfo(item) {
          let el = item.previousElementSibling;
          while (el) {
            if (el.classList && el.classList.contains('season-header')) {
              const textEl = el.querySelector('.season-text');
              const text = textEl ? textEl.textContent.trim() : '';
              const color = el.style.getPropertyValue('--season-color') || null;
              return text ? { text, color } : null;
            }
            el = el.previousElementSibling;
          }
          return null;
        }

        // ── Ambient: o próprio poster (borrado via CSS) vira o wallpaper do fundo ──
        const lightboxAmbientImg = document.getElementById('posterLightboxAmbientImg');

        function updateAmbientFromPoster(src) {
          if (!lightboxAmbient || !lightboxAmbientImg) return;
          if (lightboxAmbientImg.src !== src) {
            lightboxAmbient.classList.remove('ready');
            lightboxAmbientImg.src = src;
          }
          // Só revela o wallpaper quando a imagem já carregou, evitando
          // mostrar o quadro em branco/anterior por um instante.
          if (lightboxAmbientImg.complete && lightboxAmbientImg.naturalWidth > 0) {
            lightboxAmbient.classList.add('ready');
          } else {
            lightboxAmbientImg.onload = () => lightboxAmbient.classList.add('ready');
          }
        }

        function showItem(item) {
          if (!item) return;
          const posterWrap = item.querySelector('.poster-wrap');
          const img = posterWrap ? posterWrap.querySelector('.thumb') : null;
          if (!img) return;
          const src = img.currentSrc || img.src || img.getAttribute('data-src');
          if (!src) return;

          const titleEl = item.querySelector('.title-anime');
          const title = titleEl ? titleEl.textContent : (img.alt || '');
          const rankPos = getRankPosition(item);

          // Modo simples: animes que NÃO usam myranks-images (ex: forwatch-images)
          // mostram só a imagem ampliada, com a categoria acima e a posição/nome abaixo.
          const isMyRanks = /myranks-images\//.test(src);
          lightbox.classList.toggle('simple-mode', !isMyRanks);

          if (lightboxSimpleCategory || lightboxMediaCategory) {
            const baseLabel = CATEGORY_LABEL[currentCategory] || '';
            const division = getDivisionInfo(item);
            const categoryHtml = division
              ? `${escapeHtml(baseLabel)} <span class="simple-category-division" style="color:${division.color || 'var(--text)'}">${escapeHtml(division.text)}</span>`
              : escapeHtml(baseLabel);
            if (lightboxSimpleCategory) lightboxSimpleCategory.innerHTML = categoryHtml;
            if (lightboxMediaCategory) lightboxMediaCategory.innerHTML = categoryHtml;
          }
          if (lightboxSimpleCaption) {
            lightboxSimpleCaption.innerHTML =
              (rankPos != null ? `<span class="poster-lightbox-rank">#${rankPos}</span>` : '') +
              `<span class="poster-lightbox-simple-title">${escapeHtml(title)}</span>`;
          }

          const wasRezero = currentItem && REZERO_IDS.includes(currentItem.id);
          const isRezero = REZERO_IDS.includes(item.id);
          if (wasRezero && currentItem !== item) {
            rezeroSound.pause();
          }
          if (isRezero && currentItem !== item) {
            try {
              rezeroSound.play().catch(() => {});
            } catch (e) {}
          }

          const wasJjk = currentItem && JJK_IDS.includes(currentItem.id);
          const isJjk = JJK_IDS.includes(item.id);
          if (wasJjk && currentItem !== item) {
            jjkSound.pause();
          }
          if (isJjk && currentItem !== item) {
            try {
              jjkSound.currentTime = 0;
              jjkSound.play().catch(() => {});
            } catch (e) {}
          }

          currentItem = item;
          lightboxImg.src = src;
          lightboxImg.alt = title;
          updateAmbientFromPoster(src);
          if (lightboxTitle) {
            lightboxTitle.innerHTML = escapeHtml(title);
          }
          if (lightboxList) {
            const division = getDivisionInfo(item);
            const tags = getMembershipTags(item.id);
            const accentColor = (division && division.color) || (tags[0] && tags[0].color) || null;
            lightboxList.style.setProperty('--list-color', accentColor || 'var(--glow-accent)');

            const tagsHtml = tags
              .map(t => `<button type="button" class="list-tag" data-mode="${t.key}" data-target-id="${escapeHtml(item.id)}" style="--tag-color:${t.color || 'var(--glow-accent)'}">${t.position != null ? `<span class="list-tag-rank">#${t.position}</span>` : ''}${escapeHtml(t.label)}</button>`)
              .join('<span class="list-sep"></span>');
            // No card de "Announced Sequels", a subdivisão "Watched Animes" é
            // redundante (o próprio contexto já indica isso) e não deve
            // aparecer como tag verde no modal — some só ela, mantendo as
            // demais divisões (ex: "Summer Season 2026") normalmente.
            const hideDivision = division && division.text === ANNOUNCED_GROUP_LABELS.watched.text;
            const divisionHtml = (division && !hideDivision)
              ? `<span class="list-sep"></span><span class="list-division">${escapeHtml(division.text)}</span>`
              : '';

            lightboxList.classList.remove('no-division');
            lightboxList.innerHTML = tagsHtml + divisionHtml;
          }
          if (lightboxAnnounce) {
            const ns = nextSeasonMap[item.id];
            if (ns && ns.info) {
              const lines = String(ns.info).split(/<\/br>|<br\s*\/?>/i).map(s => s.trim()).filter(Boolean);
              lightboxAnnounce.innerHTML = `<span class="announce-line">${escapeHtml(lines.join('  •  '))}</span>`;
            } else {
              lightboxAnnounce.innerHTML = '';
            }
          }

          if (lightboxInfo) {
            const source = animeData.find(a => a.id === item.id)
              || watchingData.find(a => a.id === item.id)
              || planToWatchData.find(a => a.id === item.id);
            if (source && source.info) {
              const infoLines = String(source.info).split(/<\/br>|<br\s*\/?>/i).map(s => s.trim()).filter(Boolean);
              lightboxInfo.innerHTML = infoLines.join('  -  ');
            } else {
              lightboxInfo.innerHTML = '';
            }
          }

          renderMeta(item.id);
          renderMalScores(item.id);
          // renderRatings(item.id); // sistema de notas desativado do site (ver comentário no HTML acima)
        }

        // ── Troca de item dentro do lightbox: zero delay + polish visual ──
        // O conteúdo muda no mesmo frame do input (sem esperar fade
        // nenhum terminar — isso é o que dava a sensação de travado).
        // Por cima, dispara uma animação curta (só opacity/transform,
        // compositor-only) reiniciada via reflow forçado, sem depender
        // de transitionend/setTimeout pra continuar funcionando.
        const lightboxFigureEl = document.querySelector('.poster-lightbox-figure');

        function swapItem(nextItem) {
          showItem(nextItem);
          if (!lightboxFigureEl) return;
          lightboxFigureEl.classList.remove('is-switching');
          void lightboxFigureEl.offsetWidth; // força reflow p/ reiniciar a animação
          lightboxFigureEl.classList.add('is-switching');
        }

        function navigate(step) {
          const items = getVisibleItems();
          if (!items.length || !currentItem) return;
          const idx = items.indexOf(currentItem);
          if (idx === -1) return;
          const nextIdx = (idx + step + items.length) % items.length;
          swapItem(items[nextIdx]);
        }

        function openLightbox(item) {
          showItem(item);
          lightbox.classList.add('open');
          lightbox.setAttribute('aria-hidden', 'false');
          lockBodyScroll();
          lastFocused = document.activeElement;
          closeBtn.focus();
        }

        function closeLightbox() {
          if (currentItem && REZERO_IDS.includes(currentItem.id)) {
            rezeroSound.pause();
          }
          if (currentItem && JJK_IDS.includes(currentItem.id)) {
            jjkSound.pause();
            jjkSound.currentTime = 0;
          }
          lightbox.classList.remove('open');
          lightbox.setAttribute('aria-hidden', 'true');
          unlockBodyScroll();
          setTimeout(() => {
            lightboxImg.src = '';
            if (lightboxTitle) lightboxTitle.textContent = '';
            if (lightboxInfo) lightboxInfo.textContent = '';
            lightbox.classList.remove('simple-mode');
            if (lightboxAmbient) lightboxAmbient.classList.remove('ready');
            if (lightboxAmbientImg) lightboxAmbientImg.src = '';
            currentItem = null;
          }, 150);
          if (lastFocused && typeof lastFocused.focus === 'function') lastFocused.focus();
        }

        // Fase de captura: intercepta o clique antes que ele chegue ao
        // listener do card (que abre link externo / troca de categoria).
        document.addEventListener('click', function(e) {
          const posterWrap = e.target.closest('.poster-wrap');
          if (!posterWrap) return;

          const item = posterWrap.closest('.anime-item');
          if (!item) return;

          e.preventDefault();
          e.stopPropagation();

          openLightbox(item);
        }, true);

        closeBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          closeLightbox();
        });

        lightbox.addEventListener('click', function(e) {
          if (e.target === lightbox) closeLightbox();
        });

        if (lightboxList) {
          lightboxList.addEventListener('click', function(e) {
            const btn = e.target.closest('.list-tag');
            if (!btn) return;
            e.preventDefault();
            e.stopPropagation();
            const targetId = btn.getAttribute('data-target-id');
            const targetMode = btn.getAttribute('data-mode');
            closeLightbox();
            if (typeof navigateToAnimeInCategory === 'function') {
              navigateToAnimeInCategory(targetId, targetMode);
            }
          });
        }

        document.addEventListener('keydown', function(e) {
          if (!lightbox.classList.contains('open')) return;

          if (e.key === 'Escape') {
            closeLightbox();
          } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            e.stopPropagation();
            navigate(1);
          } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            e.stopPropagation();
            navigate(-1);
          }
        }, true);

        // ── Swipe dentro do lightbox (mobile) — troca de card, igual às setas ──
        // Usa fase de captura + stopPropagation pra impedir que o swipe
        // "vaze" pro listener global e mude a lista/categoria do fundo.
        let lbTouchStartX = 0;
        let lbTouchStartY = 0;
        let lbTouchStartTime = 0;
        let lbSwiping = false;

        const LB_SWIPE_MIN_DISTANCE = 40;
        const LB_SWIPE_MAX_OFF_AXIS = 60;
        const LB_SWIPE_MAX_TIME = 600;

        lightbox.addEventListener('touchstart', function(e) {
          if (!lightbox.classList.contains('open')) return;
          e.stopPropagation();
          if (e.touches.length !== 1) return;
          lbTouchStartX = e.touches[0].clientX;
          lbTouchStartY = e.touches[0].clientY;
          lbTouchStartTime = Date.now();
          lbSwiping = true;
        }, { capture: true, passive: true });

        lightbox.addEventListener('touchmove', function(e) {
          if (!lightbox.classList.contains('open')) return;
          e.stopPropagation();
        }, { capture: true, passive: true });

        lightbox.addEventListener('touchend', function(e) {
          if (!lightbox.classList.contains('open')) return;
          e.stopPropagation();
          if (!lbSwiping) return;
          lbSwiping = false;

          const touch = e.changedTouches[0];
          const dx = touch.clientX - lbTouchStartX;
          const dy = touch.clientY - lbTouchStartY;
          const dt = Date.now() - lbTouchStartTime;

          if (dt > LB_SWIPE_MAX_TIME) return;
          if (Math.abs(dy) > LB_SWIPE_MAX_OFF_AXIS) return;
          if (Math.abs(dx) < LB_SWIPE_MIN_DISTANCE) return;

          if (dx < 0) {
            navigate(1);   // swipe pra esquerda = próximo card
          } else {
            navigate(-1);  // swipe pra direita = card anterior
          }
        }, { capture: true, passive: true });
      })();

      function normalizeTilde(infoStr) {
        if (!infoStr) return infoStr;
        return infoStr.replace(/\(\s*~{1,3}\s*\)/g, '<span class="pause-icon">⏸</span>');
      }


      // other cards
      // { id: "midnight-heart", img: "forwatch-images/midnight-heart.webp", title: "Tune In to the Midnight Heart", info: "12 episódios" },
      // { id: "sk8", img: "forwatch-images/sk8.webp", title: "SK8 the Infinity", info: "1 temporada: 12 episódios" },
      // { id: "study-of-vanitas", img: "forwatch-images/study-of-vanitas.webp", title: "The Case Study of Vanitas", info: "2 temporadas: 24 episódios" },
      // { id: "smoking", img: "forwatch-images/smoking.webp", title: "Smoking Behind the Supermarket with You", info: "12 episódios" },
      // { id: "bocchi-the-rock", img: "forwatch-images/bocchi-the-rock.webp", title: "Bocchi the Rock!", info: "1 temporada: 12 episódios <br>2 Filmes: 2h45m", url: "" },


      // Notas do MyAnimeList (opcional, só pra itens do "All Animes"):
      // adicione um campo "mal" em qualquer item abaixo, assim:
      //   mal: [
      //     { label: "1ª temporada", episodes: 25, note: 8.42 },
      //     { label: "2ª temporada", episodes: 25, note: 8.91 }
      //   ]

      function startLoadingPoster(wrap) {
        const img = wrap.querySelector('img.thumb');

        if (!img || !fallback || img.dataset.loadStarted === '1') return;
        img.dataset.loadStarted = '1';

        const title = img.getAttribute('alt') || 'Anime';
        const src = String(img.getAttribute('data-src') || img.getAttribute('src') || '').trim();

        img.addEventListener('load', () => {
          wrap.classList.remove('has-fallback');
          img.style.display = 'block';
          img.classList.add('loaded');
        });

        img.addEventListener('error', () => {
          wrap.classList.add('has-fallback');
          fallback.textContent = makeFallbackLabel(title);
          img.style.display = 'none';
        });

        if (src) {
